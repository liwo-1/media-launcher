name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  addon:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: addon/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: addon/app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  player-agent:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: player-agent-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
