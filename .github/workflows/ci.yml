name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-catalog.js

  addon:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - addon
          - addon-beta
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/app/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.app }}/app
      - run: npm run lint
        working-directory: ${{ matrix.app }}/app
      - run: npm test
        working-directory: ${{ matrix.app }}/app
      - run: docker build --tag media-launcher-ci:${{ matrix.app }} .
        working-directory: ${{ matrix.app }}

  player-agent:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: player-agent-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
