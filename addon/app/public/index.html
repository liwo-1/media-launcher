<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Media Launcher</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="ambient-bg"></div>
  <div id="ambient-grain"></div>

  <nav id="nav">
    <div class="nav-title">Media Launcher</div>
    <div class="nav-item">
      <a href="#/home/movies" data-nav="movies">Movies</a>
      <button class="nav-scan-button" data-scan="movie" title="Scan Movies library">⟳</button>
    </div>
    <div class="nav-item">
      <a href="#/home/tvshows" data-nav="tvshows">TV Shows</a>
      <button class="nav-scan-button" data-scan="show" title="Scan TV Shows library">⟳</button>
    </div>
  </nav>

  <main id="app"></main>

  <div id="toast" class="toast hidden"></div>

  <script src="api-client.js"></script>
  <script src="components/poster-grid.js"></script>
  <script src="components/detail-view.js"></script>
  <script src="app.js"></script>
</body>
</html>
