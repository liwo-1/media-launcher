name: Media Launcher
version: "1.0.0"
slug: media_launcher
description: Poster-grid movie/TV browser backed by an existing Plex server's metadata, launches MPC-HC on the media PC
arch:
  - amd64
startup: application
boot: auto
init: false
ports:
  8088/tcp: 8088
options:
  plex_url: "http://CHANGE_ME:32400"
  plex_token: ""
  player_agent_url: "http://CHANGE_ME:7777"
  # "from" must match the path Plex itself reports for the library (check Plex web UI ->
  # Settings -> Libraries -> edit a library -> folder path, or the "file" field returned by
  # GET /library/metadata/{ratingKey}). "to" is the same folder as a Windows UNC path reachable
  # from the media PC. Use forward slashes on both sides, even for the Windows target - avoids
  # backslash-escaping bugs across YAML -> options.json -> jq -> env var -> JSON.parse. pathmap.js
  # converts to backslashes as the final step: "//nas-host/share/film" becomes
  # "\\nas-host\share\film", a valid UNC path. Both values below are placeholders - fill in your
  # own library paths and NAS host/share names after installing.
  path_map:
    - from: "/CHANGE_ME/movies"
      to: "//CHANGE_ME/share/movies"
    - from: "/CHANGE_ME/tv"
      to: "//CHANGE_ME/share/tv"
schema:
  plex_url: url
  plex_token: str
  player_agent_url: url
  path_map:
    - from: str
      to: str
